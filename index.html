<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Management</title>

    <link rel="stylesheet" href="./index.css">
</head>

<body>

    <div class="container">

        <h1>Student Online Result Management</h1>

        <!-- FORM -->
        <div class="form">

            <input type="text" id="name" placeholder="Enter Student Name">

            <input type="text" id="course1" placeholder="Enter Course 1">
              <input type="number" id="marks1" placeholder="Enter Marks">

              <input type="text" id="course2" placeholder="Enter Course 2">
              <input type="number" id="marks2" placeholder="Enter Marks">

              <input type="text" id="course3" placeholder="Enter Course 3">
              <input type="number" id="marks3" placeholder="Enter Marks">

            <button onclick="addStudent()">
                Add Result
            </button>

        </div>

        <!-- TABLE -->
        <table>

            <thead>
                <tr>
                    <th>Name</th>
                    <th>Course1</th>
                    <th>Marks1</th>
                     <th>Course2</th>
                    <th>Marks2</th>
                     <th>Course3</th>
                    <th>Marks3</th>
                    <th>Grade</th>
                    <th>Status</th>
                    <th>Average</th>
                </tr>
            </thead>

            <tbody id="resultBody">

            </tbody>

        </table>

    </div>

    <script src="./index.js"></script>

</body>

</html>
